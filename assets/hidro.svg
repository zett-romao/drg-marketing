<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DRG Hidro">
  <rect width="64" height="64" rx="15" fill="#ffffff"/>
  <defs>
    <path id="drop" d="M32 13 C32 13 46 30 46 40 A14 14 0 1 1 18 40 C18 30 32 13 32 13 Z"/>
    <clipPath id="clip"><use href="#drop"/></clipPath>
    <linearGradient id="agua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4299e1"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- gota vazia (parte de cima) -->
  <use href="#drop" fill="#d6ecfb"/>
  <!-- agua com nivel ondulado -->
  <g clip-path="url(#clip)">
    <path d="M12 41 q5 -4 10 0 t10 0 t10 0 t10 0 L52 60 L12 60 Z" fill="url(#agua)"/>
  </g>
  <!-- contorno -->
  <use href="#drop" fill="none" stroke="#1e3a5f" stroke-width="3"/>
  <!-- brilho -->
  <ellipse cx="26" cy="33" rx="2.4" ry="4" fill="#ffffff" opacity="0.6" transform="rotate(-20 26 33)"/>
</svg>
