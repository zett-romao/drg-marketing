<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DRG Liftalk">
  <rect width="64" height="64" rx="15" fill="#ffffff"/>
  <!-- cabine do elevador (portas) -->
  <rect x="11.5" y="13" width="20" height="30" rx="3.5" fill="none" stroke="#1e3a5f" stroke-width="3"/>
  <line x1="21.5" y1="15.5" x2="21.5" y2="40.5" stroke="#1e3a5f" stroke-width="2.2" stroke-linecap="round"/>
  <!-- ondas de voz (comunicação por 4G) -->
  <path d="M37 24 a 8 8 0 0 1 0 12" fill="none" stroke="#3182ce" stroke-width="3" stroke-linecap="round"/>
  <path d="M42 20 a 13 13 0 0 1 0 20" fill="none" stroke="#3182ce" stroke-width="3" stroke-linecap="round"/>
  <path d="M47 16 a 18 18 0 0 1 0 28" fill="none" stroke="#4299e1" stroke-width="3" stroke-linecap="round"/>
  <!-- pictogramas obrigatorios da norma: amarelo (registrada) + verde (atendida) -->
