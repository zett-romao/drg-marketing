<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DRG-BuscaNFe">
  <defs>
    <linearGradient id="lupa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3182ce"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>

  <!-- Documento (nota fiscal) com canto dobrado -->
  <path d="M14 7 h20 l10 10 v30 a4 4 0 0 1-4 4 H14 a4 4 0 0 1-4-4 V11 a4 4 0 0 1 4-4 z"
        fill="#ffffff" stroke="#1e3a5f" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M34 7 v10 h10" fill="none" stroke="#1e3a5f" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Linhas de texto da nota -->
  <g stroke="#90cdf4" stroke-width="2.2" stroke-linecap="round">
    <line x1="16" y1="24" x2="34" y2="24"/>
    <line x1="16" y1="30" x2="38" y2="30"/>
    <line x1="16" y1="36" x2="30" y2="36"/>
  </g>
  <!-- Codigo de barras -->
  <g stroke="#1e3a5f" stroke-width="1.6">
    <line x1="16" y1="43" x2="16" y2="48"/>
    <line x1="19" y1="43" x2="19" y2="48"/>
    <line x1="21" y1="43" x2="21" y2="48"/>
    <line x1="24" y1="43" x2="24" y2="48"/>
    <line x1="26" y1="43" x2="26" y2="48"/>
  </g>

  <!-- Lupa (busca) sobre o canto inferior direito -->
  <circle cx="42" cy="41" r="12" fill="#ffffff"/>
  <circle cx="42" cy="41" r="12" fill="none" stroke="url(#lupa)" stroke-width="4.5"/>
  <line x1="51" y1="50" x2="59" y2="58" stroke="url(#lupa)" stroke-width="5" stroke-linecap="round"/>
  <!-- Cifrao dentro da lupa -->
  <text x="42" y="46.5" font-family="Arial, sans-serif" font-size="14" font-weight="700"
        fill="#1e3a5f" text-anchor="middle">$</text>
</svg>
