<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo arredondado em marinho-900 (#0a1828) -->
  <rect width="64" height="64" rx="13" fill="#0a1828"/>

  <!-- Balança da Justiça em branco -->
  <g fill="#ffffff" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pomo (topo) -->
    <circle cx="32" cy="11" r="2.6"/>

    <!-- Mastro vertical -->
    <rect x="30.4" y="11" width="3.2" height="38"/>

    <!-- Braço horizontal -->
    <rect x="8" y="19.4" width="48" height="3.2" rx="1.6"/>

    <!-- Correntes (linhas finas) -->
    <line x1="14" y1="22.6" x2="14" y2="29" stroke-width="1.6"/>
    <line x1="50" y1="22.6" x2="50" y2="29" stroke-width="1.6"/>

    <!-- Prato esquerdo -->
    <path d="M 6 29 L 22 29 L 18.5 36 L 9.5 36 Z"/>

    <!-- Prato direito -->
    <path d="M 42 29 L 58 29 L 54.5 36 L 45.5 36 Z"/>

    <!-- Pedestal médio -->
    <rect x="26.5" y="46" width="11" height="3.2" rx="1"/>

    <!-- Base -->
    <rect x="20" y="49.5" width="24" height="3.6" rx="1.6"/>
  </g>
</svg>
